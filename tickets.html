            overflow-x: hidden;

        .noise-overlay {

        }

        .grid-overlay {
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background-image: 
                linear-gradient(rgba(57, 255, 20, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57, 255, 20, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -4; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            z-index: 9997; pointer-events: none;
            animation: scanline-scroll 10s linear infinite;
        }

        @keyframes scanline-scroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 100vh; }
        }

        .crt-vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.8) 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            z-index: 9998; pointer-events: none;
        }

        .screen-flicker {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(57, 255, 20, 0.02);
            z-index: 9999; pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.95; }
        }

        /* === UI ЭЛЕМЕНТЫ === */
        .header-controls {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 30px;
            z-index: 10;
        }

        .back-link {
            color: var(--acid-green);
            text-decoration: none;
            border: 1px solid var(--gray-border);
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .back-link:hover {
            background: var(--acid-green);
            color: #000;
            box-shadow: var(--acid-glow);
            border-color: var(--acid-green);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid var(--gray-border);
            padding: 3rem 2rem;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 30px rgba(57, 255, 20, 0.05);
        }

        .hud-corners {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 20;
        }
        .hud-corners::before, .hud-corners::after {
            content: ''; position: absolute; width: 20px; height: 20px;
        }
        .hud-corners::before {
            top: -1px; left: -1px; border-top: 2px solid var(--hud-accent); border-left: 2px solid var(--hud-accent);
        }
        .hud-corners::after {
            bottom: -1px; right: -1px; border-bottom: 2px solid var(--hud-accent); border-right: 2px solid var(--hud-accent);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-align: center;
            margin-bottom: 40px;
            color: var(--light-text);
            /* Радуга убрана, добавлен легкий свечащийся эффект */
            text-shadow: 0 0 10px rgba(255,255,255,0.2); 
            text-transform: uppercase;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        #tc-widget-container {
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--acid-green);
            text-shadow: var(--acid-glow);
        }

        @media (max-width: 768px) {
            .container { padding: 2rem 1rem; }
            h1 { font-size: 1.8rem; }
            .header-controls { justify-content: center; }
        }
    </style>
